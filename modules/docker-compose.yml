services:

  # ─────────────────────────────────────────
  # Weaviate — Vector Database
  # http://localhost:8080/v1/meta
  # ─────────────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.0
    container_name: weaviate
    ports:
      - "8090:8080"
      - "50051:50051"   # gRPC — usado por LangChain4j internamente
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
      LOG_LEVEL: info
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/meta" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Ollama — Local LLM server
  # http://localhost:11434
  # Modelos requeridos:
  #   ollama pull llama3.2
  #   ollama pull nomic-embed-text
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # persiste los modelos descargados
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

# ─────────────────────────────────────────
# Volúmenes persistentes
# Los datos sobreviven a docker compose down
# ─────────────────────────────────────────
volumes:
  weaviate_data:
    driver: local
  ollama_data:
    driver: local